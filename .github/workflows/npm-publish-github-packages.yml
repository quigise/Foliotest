            boxSizing:"border-box" }}/>
      </div>

      {/* Status (loading or last-data-date) */}
      {busy && loadCount.total > 0 ? (
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <Spinner size={12}/>
          <div style={{ width:100 }}>
            <ProgressBar value={loadCount.done} max={loadCount.total}/>
          </div>
