# Portfolio Backtester

Backtest de portefeuille avec données réelles Yahoo Finance.  
Architecture identique à testfol.io : **serveur Node.js** qui proxy Yahoo Finance (pas de CORS) + **frontend React**.

## Prérequis

- [Node.js](https://nodejs.org/) v18 ou supérieur

## Installation & lancement (3 commandes)

```bash
# 1. Installer les dépendances
cd portfolio-backtester
npm run setup

# 2. Lancer (serveur + frontend en même temps)
npm run dev
```

L'application s'ouvre automatiquement sur **http://localhost:3000**  
Le serveur API tourne sur **http://localhost:3001**

## Architecture

```
portfolio-backtester/
├── server.js          ← Serveur Express : proxy Yahoo Finance + cache 15min
├── package.json       ← Scripts de démarrage
└── client/
    ├── src/
    │   ├── App.js     ← Interface React (Trade Republic style)
    │   └── api.js     ← Fetch, alignement des séries, métriques
    └── public/
        └── index.html
```

## Pourquoi ça marche là où le sandbox Claude ne fonctionne pas ?

Le navigateur bloque les appels directs à Yahoo Finance (CORS).  
Ce serveur Express reçoit les requêtes du frontend et contacte Yahoo Finance  
**côté serveur**, sans restriction CORS, avec un cache de 15 minutes pour  
éviter les rate limits.

## Fonctionnalités

- ✅ Données réelles Yahoo Finance (actions, ETFs, crypto, commodités)
- ✅ Saisie libre de n'importe quel ticker Yahoo (MC.PA, IWDA.AS, etc.)
- ✅ 10 métriques : CAGR, Sharpe, Sortino, Drawdown max, Beta, Win Rate…
- ✅ Comparaison vs benchmark (SPY, QQQ, BTC-USD…)
- ✅ Cache serveur 15 min → backtests instantanés sur tickers déjà chargés
- ✅ Périodes : 1M, 3M, 6M, 1A, 3A, 5A

## Tickers supportés

Tout ticker valide sur Yahoo Finance :
- Actions US : `AAPL`, `MSFT`, `TSLA`, `NVDA`…
- Actions EU : `MC.PA` (LVMH), `AIR.PA` (Airbus), `ASML.AS`…
- ETFs : `SPY`, `QQQ`, `IWDA.AS`, `CW8.PA`…
- Crypto : `BTC-USD`, `ETH-USD`, `SOL-USD`…
- Commodités : `GLD`, `SLV`, `TLT`…

